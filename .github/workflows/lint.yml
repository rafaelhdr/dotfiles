name: Neovim Config Lint

on:
  push:
    branches: [main]
    paths:
      - 'config/.config/nvim/**'
      - '.luacheckrc'
  pull_request:
    branches: [main]
    paths:
      - 'config/.config/nvim/**'
      - '.luacheckrc'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  lint:
    name: LuaCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: 'config/.config/nvim/ --no-color --codes'
