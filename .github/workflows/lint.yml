name: Neovim Config Lint

on:
  push:
    branches: [main]
    paths:
      - 'config/.config/nvim/**'
  pull_request:
    branches: [main]
    paths:
      - 'config/.config/nvim/**'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  lint:
    name: LuaCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Luacheck
        uses: lunarmodules/luacheck@v1
        with:
          version: '1.2.0'

      - name: Run Luacheck
        run: |
          luacheck config/.config/nvim/ \
            --std lua51+luajit+busted \
            --globals vim \
            --no-color \
            --codes
