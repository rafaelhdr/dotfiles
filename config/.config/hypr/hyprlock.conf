$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1
    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 3, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = ~/Pictures/Backgrounds/current.jpg
    blur_passes = 5
    noise = 0.02
}

# GREETING
label {
    monitor =
    text = cmd[update:0] echo "Hello, $(whoami)"
    color = rgba(a5adce99)
    font_size = 18
    font_family = $font

    position = 0, 170
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgba(c6d0f5e6)
    font_size = 16
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, 80
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(a5adcecc)
    font_size = 25
    font_family = $font

    position = 0, -25
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(c6d0f5e6)
    font_size = 90
    font_family = $font

    position = 0, -120
    halign = center
    valign = center
}
