$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = easeOut, 0.16, 1, 0.3, 1
    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 3, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = ~/Pictures/Backgrounds/screenlock.jpg
    blur_passes = 2
    blur_size = 5
    noise = 0.012
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.15
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(fae3b0f2)
    font_size = 96
    font_family = $font Bold

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(1a0e00b0)

    position = 0, 120
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(e8c880cc)
    font_size = 22
    font_family = $font

    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(1a0e0080)

    position = 0, 40
    halign = center
    valign = center
}

# GREETING
label {
    monitor =
    text = cmd[update:0] echo "Hello, $(whoami)"
    color = rgba(c8d4b0aa)
    font_size = 16
    font_family = $font

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1a0e0070)

    position = 0, -15
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 22%, 52

    outline_thickness = 2
    inner_color = rgba(1a0e00, 0.55)

    outer_color = rgba(e8a040cc) rgba(5a9828cc) 45deg
    check_color = rgba(5a9828cc) rgba(fae3b0cc) 120deg
    fail_color = rgba(e04020cc) rgba(c82010cc) 40deg

    font_color = rgba(c87010ff)
    font_size = 16
    fade_on_empty = false
    rounding = 12

    font_family = $font
    placeholder_text = Enter password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3
    dots_rounding = -1

    position = 0, -115
    halign = center
    valign = center
}
